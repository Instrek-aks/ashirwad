<!DOCTYPE html>
<html>
<head>
  <title>Image Gallery Viewer</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #fff; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .item { border: 1px solid #ccc; padding: 10px; text-align: center; border-radius: 8px; }
    img { max-width: 100%; height: auto; display: block; margin: 10px auto; max-height: 300px; object-fit: contain; }
  </style>
</head>
<body>
  <h1>Public Directory Images</h1>
  <div class="grid">
    <div class="item"><h3>d2.png</h3><img src="d2.png"></div>
    <div class="item"><h3>d3.png</h3><img src="d3.png"></div>
    <div class="item"><h3>d3 (2).png</h3><img src="d3 (2).png"></div>
    <div class="item"><h3>d4.png</h3><img src="d4.png"></div>
    <div class="item"><h3>d5.png</h3><img src="d5.png"></div>
    <div class="item"><h3>d6.png</h3><img src="d6.png"></div>
  </div>
</body>
</html>
